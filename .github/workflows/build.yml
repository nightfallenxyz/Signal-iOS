name: Build Signal IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/signal.mobileprovision

      - name: Install certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install

      - name: Archive unsigned
        run: |
          xcodebuild -workspace Signal.xcworkspace \
            -scheme Signal \
            -configuration Release \
            -archivePath Signal.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package IPA
        run: |
          mkdir -p output
          cp -r Signal.xcarchive/Products/Applications/Signal.app .
          mkdir Payload
          cp -r Signal.app Payload/
          zip -r output/Signal.ipa Payload/

      - name: Sign IPA
        run: |
          codesign -f -s "iPhone Distribution" \
            --entitlements Signal.xcarchive/Products/Applications/Signal.app/Signal.entitlements \
            --keychain build.keychain \
            output/Signal.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Signal-IPA
          path: output/*.ipa

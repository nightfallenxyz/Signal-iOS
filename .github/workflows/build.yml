name: Build Signal IPA

on:
  workflow_dispatch:

jobs:
 build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/signal.mobileprovision

      - name: Install certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install --clean-install

      - name: Download libsignal-ffi
        run: |
          CACHE_DIR="$HOME/Library/Caches/org.signal.libsignal"
          mkdir -p "$CACHE_DIR"
          python3 Pods/LibSignalClient/bin/fetch_archive.py \
            -u "https://build-artifacts.signal.org/libraries/libsignal-client-ios-build-v0.96.3.tar.gz" \
            -c "6c19715a8ecee6b0872f7b99512d3e75db007f3b0d8f875bca5f7e2d6c4c4755" \
            -o "$CACHE_DIR"

- name: FULL bundle ID audit (required before patching)
  run: |
    echo "===== PRODUCT_BUNDLE_IDENTIFIER LOCATIONS ====="
    grep -R "PRODUCT_BUNDLE_IDENTIFIER" -n . || true

    echo ""
    echo "===== ALL KNOWN SIGNAL BUNDLE IDS ====="
    grep -R "org.whispersystems" -n . || true
    grep -R "org.signal" -n . || true

    echo ""
    echo "===== EXTENSION BUNDLE IDS ====="
    grep -R "NSExtension" -n . || true
    grep -R "NotificationService" -n . || true
    grep -R "ShareExtension" -n . || true

    echo ""
    echo "===== XCODE TARGET SETTINGS (raw hits) ====="
    grep -R "INFOPLIST_KEY_CFBundleIdentifier" -n . || true
    grep -R "CFBundleIdentifier" -n . || true

    echo ""
    echo "===== XCCONFIG FILES ====="
    find . -name "*.xcconfig" -print -exec cat {} \; || true

    echo ""
    echo "===== PROJECT FILE DIRECT HIT ====="
    grep -n "Bundle identifier" Signal.xcodeproj/project.pbxproj || true
      - name: Patch AutoFill API compatibility
        run: |
          FILE="Signal/Backups/BackupRecordKeyViewController.swift"
          grep -n "ASCredentialDataManager\|ASAutoFillURLScope" "$FILE" || true
          python3 - <<'EOF'
          import re
          with open("Signal/Backups/BackupRecordKeyViewController.swift", "r") as f:
              content = f.read()
          content = re.sub(r'.*ASCredentialDataManager.*', '// patched: ASCredentialDataManager removed', content)
          content = re.sub(r'.*ASAutoFillURLScope.*', '// patched: ASAutoFillURLScope removed', content)
          with open("Signal/Backups/BackupRecordKeyViewController.swift", "w") as f:
              f.write(content)
          print("Patch applied")
          EOF


      - name: Archive
        run: |
          xcodebuild -workspace Signal.xcworkspace \
            -scheme Signal \
            -configuration "App Store Release" \
            -archivePath Signal.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            archive

      - name: Package and sign IPA
        run: |
          APP_PATH=$(find Signal.xcarchive -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/Signal.app
          /usr/bin/codesign --force --sign "iPhone Distribution" \
            --keychain build.keychain \
            --entitlements "$APP_PATH/archived-expanded-entitlements.xcent" \
            Payload/Signal.app
          zip -r Signal.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Signal-IPA
          path: Signal.ipa

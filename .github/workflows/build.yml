name: Build Signal IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/signal.mobileprovision

      - name: Install certificate
        run: |
          echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod install --clean-install


      - name: Download libsignal-ffi
        run: |
          # Find the fetch script and checksum values from the podspec
          ARCHIVE=$(grep LIBSIGNAL_FFI_PREBUILD_ARCHIVE Pods/LibSignalClient/LibSignalClient.podspec 2>/dev/null || \
                    grep LIBSIGNAL_FFI_PREBUILD_ARCHIVE Pods/Local\ Podspecs/LibSignalClient.podspec 2>/dev/null || \
                    find Pods -name "*.podspec" -exec grep -l LIBSIGNAL_FFI_PREBUILD_ARCHIVE {} \; | xargs grep LIBSIGNAL_FFI_PREBUILD_ARCHIVE | head -1)
          echo "Archive line: $ARCHIVE"
          
          # Run fetch script directly
          FETCH_SCRIPT=$(find Pods/LibSignalClient -name "fetch_archive.py" | head -1)
          echo "Fetch script: $FETCH_SCRIPT"
          
          CHECKSUM=$(grep -r "LIBSIGNAL_FFI_PREBUILD_CHECKSUM" Pods/LibSignalClient/ | head -1)
          echo "Checksum line: $CHECKSUM"
          
          find Pods/LibSignalClient -name "*.py" -o -name "*.sh" | head -10

      - name: Archive
        run: |
          xcodebuild -workspace Signal.xcworkspace \
            -scheme Signal \
            -configuration Release \
            -archivePath Signal.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Package and sign IPA
        run: |
          APP_PATH=$(find Signal.xcarchive -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/Signal.app
          /usr/bin/codesign --force --sign "iPhone Distribution" \
            --keychain build.keychain \
            --entitlements "$APP_PATH/archived-expanded-entitlements.xcent" \
            Payload/Signal.app
          zip -r Signal.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Signal-IPA
          path: Signal.ipa

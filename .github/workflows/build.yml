name: Build Signal IPA
on:
 workflow_dispatch:
jobs:
 build:
   runs-on: macos-latest
   steps:
     - uses: actions/checkout@v4

     - name: Install provisioning profile
       run: |
         mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
         echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/signal.mobileprovision

     - name: Install certificate
       run: |
         echo "${{ secrets.P12_BASE64 }}" | base64 --decode > cert.p12
         security create-keychain -p "" build.keychain
         security import cert.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign
         security list-keychains -s build.keychain
         security default-keychain -s build.keychain
         security unlock-keychain -p "" build.keychain
         security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

     - name: Install CocoaPods
       run: |
         sudo gem install cocoapods
         pod install

     - name: Archive
       run: |
         xcodebuild -workspace Signal.xcworkspace \
           -scheme Signal \
           -configuration Release \
           -archivePath Signal.xcarchive \
           CODE_SIGN_IDENTITY="iPhone Distribution" \
           CODE_SIGN_STYLE="Manual" \
           DEVELOPMENT_TEAM=6485VSR3X7 \
           PRODUCT_BUNDLE_IDENTIFIER=app.mango4068.radish4918 \
           PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]="signal" \
           CODE_SIGNING_ALLOWED="YES" \
           CODE_SIGNING_REQUIRED[sdk=iphoneos*]="YES" \
           "PROVISIONING_PROFILE_SPECIFIER[sdk=macosx*]"="" \
           archive

     - name: Export IPA
       run: |
         xcodebuild -exportArchive \
           -archivePath Signal.xcarchive \
           -exportPath ./output \
           -exportOptionsPlist ExportOptions.plist

     - name: Upload IPA
       uses: actions/upload-artifact@v4
       with:
         name: Signal-IPA
         path: output/*.ipa
